# Threat Intel Diario Configuration
# Periódico digital de ciberseguridad

# Theme Settings
remote_theme             : "mmistakes/minimal-mistakes@4.15.1"
minimal_mistakes_skin    : "haxor" # usa tu skin personalizado

# Site Settings
locale                   : "es-MX"
title                    : "Threat Intel Diario"
title_separator          : "|"
name                     : "Threat Intel Diario"

description              : "Periódico digital de ciberseguridad: phishing, malware, OSINT y noticias de amenazas"

url                      : "https://threatinteldiario.github.io"
baseurl                  : ""
repository               : "ThreatIntelDiario/threatinteldiario.github.io"

logo                     : "/assets/images/logo.png"
favicon                  : "/assets/images/favicon.png"
teaser                   : "/assets/images/teaser.png"

logo                     : "/assets/images/masthead.png"
teaser                   : "/assets/images/teaser.png"

breadcrumbs              : true
words_per_minute         : 220

# Comentarios y feeds
comments:
  provider               : false

atom_feed:
  path                   : feed.xml

# Buscador interno
search                   : true
search_full_content      : true
search_provider          : "lunr"

# SEO Related
google_site_verification :
bing_site_verification   :

# Social Sharing
twitter:
  username               : "threatinteldiar"

og_image                 : "/assets/images/og-image.png"

# Social Profiles
social:
  type                   : "Organization"
  name                   : "Threat Intel Diario"
  links:
    - "https://x.com/threatinteldiar"

# Analytics
analytics:
  provider               : "google"
  google:
    tracking_id          : "G-XXXXXXXXXX"
    anonymize_ip         : true

# Site Author
author:
  name             : "Threat Intel Diario"
  avatar           : "/assets/images/avatar.png"
  bio              : >
    Diario digital de ciberseguridad: seguimiento de campañas de phishing,
    actividad de malware, infraestructura adversaria y amenazas emergentes.
  location         : "México"
  twitter          : "threatinteldiar"
  # Se eliminó el enlace de GitHub

# Lectura y exclusiones
include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - node_modules
  - README.md
  - tmp
  - /docs
  - /test

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 8
paginate_path: /page:num/
timezone: "America/Mexico_City"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true
